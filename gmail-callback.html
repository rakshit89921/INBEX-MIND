<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gmail Connected — INBEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #040714;
            color: #f8fafc;
        }
        .card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            max-width: 440px;
            backdrop-filter: blur(20px);
        }
        .icon { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
        p { color: #94a3b8; font-size: 0.95rem; line-height: 1.5; margin-bottom: 8px; }
        .email { color: #818cf8; font-weight: 600; }
        .btn {
            display: inline-block;
            margin-top: 24px;
            padding: 12px 32px;
            border: none;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(99,102,241,0.4); }
        .error { color: #f87171; }
        .countdown { color: #64748b; font-size: 0.82rem; margin-top: 12px; }
    </style>
</head>
<body>
    <div class="card" id="card">
        <div class="icon" id="icon">✅</div>
        <h1 id="title">Gmail Connected!</h1>
        <p id="message">Your Gmail account has been successfully linked to INBEX.</p>
        <p id="email-display"></p>
        <a href="dashboard.html" class="btn" id="action-btn">Go to Dashboard</a>
        <p class="countdown" id="countdown">Redirecting in 3 seconds...</p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const status = params.get('status');
        const email = params.get('email');
        const errorMsg = params.get('message');

        if (status === 'error') {
            document.getElementById('icon').textContent = '❌';
            document.getElementById('title').textContent = 'Connection Failed';
            document.getElementById('message').innerHTML = `<span class="error">${errorMsg || 'Something went wrong. Please try again.'}</span>`;
            document.getElementById('countdown').textContent = '';
        } else {
            if (email) {
                document.getElementById('email-display').innerHTML = `Connected as <span class="email">${email}</span>`;
            }
            // Auto-redirect after 3s
            let sec = 3;
            const timer = setInterval(() => {
                sec--;
                document.getElementById('countdown').textContent = `Redirecting in ${sec} second${sec !== 1 ? 's' : ''}...`;
                if (sec <= 0) {
                    clearInterval(timer);
                    window.location.href = 'dashboard.html';
                }
            }, 1000);
        }
    </script>
</body>
</html>
